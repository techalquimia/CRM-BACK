spring:
  application:
    name: logistics-api

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:}

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:logistics}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

gcp:
  enabled: ${GCP_ENABLED:false}
  storage:
    bucket-name: ${GCP_BUCKET_NAME:logistics-evidence-bucket}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  packages-to-scan: com.techalquimia.logistics.controller

jwt:
  secret: ${JWT_SECRET:logistics-api-secret-key-min-32-chars-long-for-hs256}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  storage:
    local-path: ${APP_STORAGE_PATH:./uploads}
  api:
    prefix: /api/v1
