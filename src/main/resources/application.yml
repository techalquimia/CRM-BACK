spring:
  application:
    name: logistics-api

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:}

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:logistics}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

gcp:
  storage:
    bucket-name: ${GCP_BUCKET_NAME:logistics-evidence-bucket}

app:
  api:
    prefix: /api/v1
