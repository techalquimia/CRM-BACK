name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGION: northamerica-south1
  SERVICE_NAME: route-evidence-api

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          source: ./RouteEvidence
          region: ${{ secrets.GCP_REGION || env.REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          flags: --allow-unauthenticated
          env_vars: |
            ASPNETCORE_ENVIRONMENT=Production
            ASPNETCORE_URLS=http://+:8080
            ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION }}
            Jwt__Key=${{ secrets.JWT_KEY }}
            Gcp__StorageBucket=${{ secrets.GCP_STORAGE_BUCKET }}
