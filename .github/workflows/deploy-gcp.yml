name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGION: us-central1
  SERVICE_NAME: route-evidence-api

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build image with Cloud Build
        run: |
          gcloud builds submit ./RouteEvidence \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --timeout=1200
        env:
          CLOUDSDK_CORE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION || 'us-central1' }} \
            --platform managed \
            --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars "ASPNETCORE_ENVIRONMENT=Production" \
            --set-env-vars "ASPNETCORE_URLS=http://+:8080" \
            --set-env-vars "ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION }}" \
            --set-env-vars "Jwt__Key=${{ secrets.JWT_KEY }}" \
            --set-env-vars "Gcp__StorageBucket=${{ secrets.GCP_STORAGE_BUCKET }}"
