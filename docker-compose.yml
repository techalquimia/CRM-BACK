services:
  api:
    build:
      context: ./RouteEvidence
      dockerfile: Dockerfile
    container_name: route-evidence-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=mariadb;Database=RouteEvidence;User=root;Password=routeevidence2025;
      - Jwt__Key=YourSecretKeyMin32CharactersForHS256!
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-credentials.json
    volumes:
      - /Users/rasecmc/Downloads/gcp-credentials.json:/app/gcp-credentials.json:ro
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11.2
    environment:
      - MARIADB_ROOT_PASSWORD=routeevidence2025
      - MARIADB_DATABASE=RouteEvidence
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
