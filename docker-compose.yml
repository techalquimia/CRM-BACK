version: '3.8'

services:
  mariadb:
    image: mariadb:11.2
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: logistics
      MARIADB_USER: logistics
      MARIADB_PASSWORD: logistics123
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: logistics
      DB_USER: logistics
      DB_PASSWORD: logistics123
      GCP_ENABLED: ${GCP_ENABLED:-false}
      GCP_BUCKET_NAME: ${GCP_BUCKET_NAME:-logistics-evidence-bucket}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  mariadb_data:
