services:
  db:
    image: mysql:8.0
    container_name: workflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Facil123.}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-WorkflowDb}
      MYSQL_USER: ${MYSQL_USER:-workflow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Facil123.}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - workflow_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workflow-api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Port=3306;Database=${MYSQL_DATABASE:-WorkflowDb};User=root;Password=${MYSQL_ROOT_PASSWORD:-Facil123.};"
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  workflow_mysql_data:
