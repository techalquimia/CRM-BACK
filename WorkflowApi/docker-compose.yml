services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: workflow-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQLSERVER_SA_PASSWORD:-YourStrong@Passw0rd}
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - workflow_sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q \"SELECT 1\" -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workflow-api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=${SQLSERVER_DATABASE:-WorkflowDb};User Id=sa;Password=${SQLSERVER_SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;"
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  workflow_sqlserver_data:
